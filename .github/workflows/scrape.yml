name: Villepinte Events Scraper

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pandas openpyxl xlsxwriter gspread google-auth
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
      - name: Lancer le scraper
        run: python run.py --seed-only
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
